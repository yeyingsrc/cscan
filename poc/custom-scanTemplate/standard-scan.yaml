# 标准扫描模板
name: 标准扫描
description: 端口扫描 + 指纹识别 + 漏洞扫描 + JS敏感信息与未授权检测，适合日常安全检测
category: standard
tags:
  - 标准
  - 漏洞扫描
  - JS审计
sort_number: 2
config:
  portscan:
    enable: true
    ports: "21,22,23,25,53,80,443,1433,3306,3389,5432,6379,8080,27017"
    rate: 500
    timeout: 5
  fingerprint:
    enable: true
  pocscan:
    enable: true
    severity: "critical,high,medium"
  dirscan:
    enable: false
  domainscan:
    enable: false
  jsfinder:
    enable: true
    threads: 10
    timeout: 10
    enableSourcemap: true
    enableUnauthCheck: true
